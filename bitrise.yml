format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

workflows:
  sample:
    envs:
    - BITRISEIO_ARTIFACT_PULL_TOKEN: token
    - BITRISE_APP_SLUG: slug
    - BITRISEIO_FINISHED_STAGES: "[]"
    steps:
    - path::./:
        title: Execute step
        inputs:
        - verbose: true
        - artifact_sources: .*

  check:
    steps:
    - git::https://github.com/bitrise-steplib/steps-check.git: { }

  e2e:
    steps:
    # TODO(SW-3004): e2e is disabled. The `_setup` step in e2e/bitrise.yml mints a production
    # artifact-pull JWT via the retired Keycloak Auth Service endpoint, which now returns 404
    # after that service was decommissioned. This was the only use-case where a step needed a
    # production token generated from a build.
    #
    # We are NOT migrating the current self-minting approach: exposing production token creation
    # to builds for this single use-case is not desirable. Instead, the agreed plan is to rebuild
    # the e2e as a real pipeline-based CI setup. In a pipeline, earlier stages run the generator
    # workflows (textfile_generator, tar_archive_generator, zip_archive_generator_en/jp, ...) and a
    # final stage runs the four pull-and-verify workflows; the platform then injects
    # BITRISEIO_FINISHED_STAGES and the artifact-pull token automatically on every run, so no manual
    # token fetch is needed. The step itself needs no changes, only the e2e config is restructured.
    # Because the shared Step CI scaffolding doesn't support pipeline configs, this will live as a
    # separate Bitrise project alongside it, as an additional check rather than a replacement.
    # - git::https://github.com/bitrise-steplib/steps-check.git:
    #     inputs:
    #     - workflow: e2e
    - script:
        title: e2e disabled (SW-3004)
        inputs:
        - content: |-
            #!/bin/env bash
            echo "e2e tests are disabled (SW-3004): the production artifact-pull token endpoint was retired."
            echo "These tests will be replaced by a separate pipeline-based Bitrise project; see the TODO in bitrise.yml."

  generate_readme:
    steps:
    - git::https://github.com/bitrise-steplib/steps-readme-generator.git@main:
        inputs:
        - contrib_section: docs/contribution.md
        - example_section: docs/examples.md
