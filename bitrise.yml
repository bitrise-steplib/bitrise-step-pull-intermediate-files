format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

workflows:
  sample:
    envs:
    - BITRISEIO_ARTIFACT_PULL_TOKEN: token
    - BITRISE_APP_SLUG: slug
    - BITRISEIO_FINISHED_STAGES: "[]"
    steps:
    - path::./:
        title: Execute step
        inputs:
        - verbose: true
        - artifact_sources: .*

  check:
    steps:
    - git::https://github.com/bitrise-steplib/steps-check.git: { }

  e2e:
    steps:
    # TODO(SW-3004): e2e is temporarily disabled. The `_setup` step in e2e/bitrise.yml mints an
    # artifact-pull token via the retired Keycloak Auth Service endpoint
    # (auth.services.bitrise.io/.../openid-connect/token), which now returns 404 after the
    # decommission in favor of the Token Issuer Service (TIS). TIS does not expose public token
    # creation, so the e2e harness needs a new way to obtain a token. Re-enable once the
    # replacement (staging TIS token endpoint + credential) is confirmed.
    # - git::https://github.com/bitrise-steplib/steps-check.git:
    #     inputs:
    #     - workflow: e2e
    - script:
        title: e2e temporarily disabled (SW-3004)
        inputs:
        - content: |-
            #!/bin/env bash
            echo "e2e tests are temporarily disabled (SW-3004): the artifact-pull token endpoint was retired."
            echo "See the TODO in bitrise.yml and e2e/bitrise.yml _setup."

  generate_readme:
    steps:
    - git::https://github.com/bitrise-steplib/steps-readme-generator.git@main:
        inputs:
        - contrib_section: docs/contribution.md
        - example_section: docs/examples.md
